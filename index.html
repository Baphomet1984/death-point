<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Signal Hub</title>

<style>

/* ===============================
   BASE
================================ */
body {
    margin: 0;
    background: #000;
    color: #00ff99;
    font-family: monospace;
    overflow: hidden;
}

#hub-container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* ===============================
   AVATAR
================================ */
#avatar {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    opacity: 0.8;
}

/* ===============================
   MENU BOTONES
================================ */
#menu {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translateX(-50%);
    list-style: none;
    padding: 0;
    text-align: center;
}

#menu li {
    margin: 10px 0;
}

#menu a {
    color: #00ff99;
    text-decoration: none;
    font-size: 16px;
    transition: color 0.3s ease;
}

#menu a:hover {
    color: #ffffff;
}

/* ===============================
   STATUS
================================ */
#hub-status {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 14px;
}

/* ===============================
   SYSTEM FAIL → PUNTO ROJO
================================ */
#systemFailBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 10px red;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
}

#systemFailBtn.pressing {
    transform: scale(1.6);
    box-shadow: 0 0 25px red;
}

/* ===============================
   OVERLAY KERNEL
================================ */
#kernelOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 20000;
    padding: 40px;
    box-sizing: border-box;
    overflow-y: auto;
}

#kernelConsole {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.5;
}

/* ===============================
   GLITCH
================================ */
.glitch {
    animation: glitchAnim 0.2s infinite;
}

@keyframes glitchAnim {
    0% { filter: contrast(1) hue-rotate(0deg); }
    50% { filter: contrast(4) hue-rotate(180deg); }
    100% { filter: contrast(1) hue-rotate(0deg); }
}

</style>
</head>

<body>

<div id="hub-container">

    <div id="avatar">◉</div>

    <ul id="menu">
        <li><a href="https://google.com" target="_blank">NAVEGADOR</a></li>
        <li><a href="https://youtube.com" target="_blank">VIDEO</a></li>
        <li><a href="https://github.com" target="_blank">CÓDIGO</a></li>
        <li><a href="https://openai.com" target="_blank">IA</a></li>
        <li><a href="https://wikipedia.org" target="_blank">ARCHIVOS</a></li>
    </ul>

    <div id="hub-status">ESTABLE</div>

    <!-- Punto rojo System Fail -->
    <button id="systemFailBtn"></button>

</div>

<div id="kernelOverlay">
    <div id="kernelConsole"></div>
</div>

<script>

/* ===============================
   VARIABLES
================================ */
const systemBtn = document.getElementById("systemFailBtn");
const kernelOverlay = document.getElementById("kernelOverlay");
const kernelConsole = document.getElementById("kernelConsole");
const hubStatus = document.getElementById("hub-status");

let holdTimeout;
let kernelActive = false;

/* ===============================
   HOLD 3 SEGUNDOS
================================ */
function startHold() {
    if (kernelActive) return;

    systemBtn.classList.add("pressing");

    holdTimeout = setTimeout(() => {
        activateKernel();
    }, 3000);
}

function cancelHold() {
    systemBtn.classList.remove("pressing");
    clearTimeout(holdTimeout);
}

systemBtn.addEventListener("mousedown", startHold);
systemBtn.addEventListener("mouseup", cancelHold);
systemBtn.addEventListener("mouseleave", cancelHold);
systemBtn.addEventListener("touchstart", startHold);
systemBtn.addEventListener("touchend", cancelHold);

/* ===============================
   ACTIVAR KERNEL
================================ */
function activateKernel() {

    kernelActive = true;

    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
    }

    document.body.classList.add("glitch");

    setTimeout(() => {
        document.body.classList.remove("glitch");
        openOverlay();
    }, 2000);
}

function openOverlay() {
    kernelOverlay.style.display = "block";
    kernelConsole.innerHTML = "";
    runKernelSequence();
}

/* ===============================
   EFECTO ESCRITURA
================================ */
function typeLine(text, speed = 25) {
    return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
            kernelConsole.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                kernelConsole.innerHTML += "\n";
                resolve();
            }
        }, speed);
    });
}

/* ===============================
   SECUENCIA KERNEL
================================ */
async function runKernelSequence() {

    const cpu = navigator.hardwareConcurrency || "unknown";
    const memory = navigator.deviceMemory || "unknown";
    const battery = navigator.getBattery ? await navigator.getBattery() : null;
    const batteryLevel = battery ? Math.floor(battery.level * 100) + "%" : "unknown";

    const lines = [
        "[BOOT] Initializing Signal Core...",
        "[KERNEL] Mounting anomaly layer...",
        `[SCAN] CPU threads: ${cpu}`,
        `[SCAN] RAM blocks: ${memory}GB`,
        `[SCAN] Battery integrity: ${batteryLevel}`,
        "[SYS] Checking entropy pool...",
        "[OK] Entropy stabilized",
        "[WARN] Behavioral anomaly detected",
        "[KERNEL] Switching execution layer...",
        "[MODE] KERNEL_DIVERGENCE_ACTIVE",
        "[ROOT ACCESS] granted",
        "[WARNING] You are not supposed to be here."
    ];

    for (let line of lines) {
        await typeLine(line);
    }

    unlockSystem();
}

/* ===============================
   DESBLOQUEO
================================ */
function unlockSystem() {

    const msg = document.createElement("div");
    msg.style.color = "#ff2e2e";
    msg.innerHTML = "\n⚠ ACCESO OCULTO DESBLOQUEADO ⚠";
    kernelConsole.appendChild(msg);

    hubStatus.textContent = "CRÍTICO";
    hubStatus.style.color = "red";

    kernelOverlay.addEventListener("click", () => {
        kernelOverlay.style.display = "none";
    });
}

</script>

</body>
</html>

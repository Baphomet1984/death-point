<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Signal Entity</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
    color:#0f0;
}

/* Fragmentos */
.code-fragment{
    position:absolute;
    opacity:0.15;
    user-select:none;
    pointer-events:none;
    animation:pulse 4s infinite ease-in-out;
}

@keyframes pulse{
    0%{opacity:0.1;}
    50%{opacity:0.3;}
    100%{opacity:0.1;}
}

/* Punto rojo */
#signal{
    position:fixed;
    top:15px;
    left:15px;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 15px red;
    cursor:pointer;
    transition:transform 0.2s;
}

/* Overlay */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:black;
}

.glitch{
    color:red;
    font-size:2rem;
    animation:glitch 0.12s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-6px,6px);}
    40%{transform:translate(6px,-6px);}
    60%{transform:translate(-4px,4px);}
    80%{transform:translate(4px,-4px);}
    100%{transform:translate(0);}
}

#terminal{
    color:#00ff00;
    font-size:14px;
    width:80%;
    max-width:800px;
    text-align:left;
    white-space:pre-line;
}

#progressBar{
    width:100%;
    height:10px;
    border:1px solid #00ff00;
    margin-top:10px;
}

#progress{
    height:100%;
    width:0%;
    background:#00ff00;
}

@keyframes shake{
    0%{transform:translate(0);}
    25%{transform:translate(-5px,5px);}
    50%{transform:translate(5px,-5px);}
    75%{transform:translate(-5px,-5px);}
    100%{transform:translate(5px,5px);}
}
</style>
</head>

<body>

<div id="signal"></div>
<div id="overlay"></div>

<script>

// -------- FRAGMENTOS --------

const fragments = [
"kernel.panic()",
"ERR_FATAL_SIGNAL",
"memory_corruption",
"void main(){ }",
"0x004F3A",
"decrypt.fail",
"inject.override()",
"segmentation_fault"
];
let failureReady = false;
let touchCount = 0;

for(let i=0;i<40;i++){
    let span=document.createElement("div");
    span.className="code-fragment";
    span.innerText=fragments[Math.floor(Math.random()*fragments.length)];
    span.style.top=Math.random()*100+"vh";
    span.style.left=Math.random()*100+"vw";
    span.style.fontSize=(12+Math.random()*18)+"px";
    document.body.appendChild(span);

    setInterval(()=>{
        let text=span.innerText;
        let index=Math.floor(Math.random()*text.length);
        let randomChar=String.fromCharCode(33+Math.random()*94);
        span.innerText=text.substring(0,index)+randomChar+text.substring(index+1);
    },1200+Math.random()*1500);
}

// -------- PUNTO ROJO --------

let signal=document.getElementById("signal");
let overlay=document.getElementById("overlay");
let holdTimer;
overlay.addEventListener("click", function(){

    if(!failureReady) return;

    touchCount++;

    if(touchCount === 1){
        // Primer toque: no hace nada
        overlay.style.opacity = "0.9";
        setTimeout(()=>{
            overlay.style.opacity = "1";
        },120);
        return;
    }

    if(touchCount === 2){
        failureReady = false;
        startTerminal();
    }

});
setInterval(()=>{
    signal.style.opacity=Math.random()>0.7?0.3:1;
},300);

setInterval(()=>{
    let x=Math.random()*6-3;
    let y=Math.random()*6-3;
    signal.style.transform=`translate(${x}px,${y}px)`;
},800);

signal.addEventListener("mousedown",startHold);
signal.addEventListener("touchstart",startHold);
signal.addEventListener("mouseup",cancelHold);
signal.addEventListener("mouseleave",cancelHold);
signal.addEventListener("touchend",cancelHold);

function startHold(){
    holdTimer=setTimeout(startSequence,1500);
}

function cancelHold(){
    clearTimeout(holdTimer);
}

// -------- SECUENCIA --------

function startSequence(){

    if(navigator.vibrate){
        navigator.vibrate([200,100,200,100,400]);
    }

    document.querySelectorAll(".code-fragment").forEach(e=>e.remove());
    signal.remove();

    overlay.style.display="flex";

    overlay.innerHTML = `
        <div id="warning" style="color:red;font-size:1.4rem;text-align:center;"></div>
    `;

    const warning = document.getElementById("warning");

    const warnings = [
        "UNAUTHORIZED ACCESS DETECTED",
        "INTRUSION PROTOCOL ACTIVATED",
        "CORE INSTABILITY RISING",
        "ENTITY AWAKENING",
        "SYSTEM BREACH IMMINENT"
    ];

    let i = 0;

    function showWarning(){
        if(i < warnings.length){
            warning.innerText = warnings[i];
            warning.style.opacity = 0;
            warning.style.transition = "opacity 0.6s";
            setTimeout(()=> warning.style.opacity = 1, 50);
            i++;
            setTimeout(showWarning, 1200);
        } else {
            setTimeout(()=>{
                overlay.innerHTML = `
                    <div class='glitch'>SYSTEM FAILURE</div>
                   <!-- <div style='color:white;margin-top:20px;'>Touch to continue...</div>-->
                `;
setTimeout(()=>{
    failureReady = true;
    touchCount = 0;
},800);
            },1200);
        }
    }

    showWarning();
}

function startTerminal(){

    overlay.innerHTML=`
        <div id="terminal"></div>
        <div id="progressBar"><div id="progress"></div></div>
    `;

    let terminal=document.getElementById("terminal");
    let progress=document.getElementById("progress");

    const lines = [
        "Initializing override protocol...",
        "Bypassing encrypted layers...",
        "Accessing restricted memory blocks...",
        "Injecting unstable payload...",
        "WARNING: Resistance detected...",
        "Forcing compliance..."
    ];

    let lineIndex = 0;

    function typeLine(text, callback){
        let i=0;
        let interval=setInterval(()=>{
            terminal.innerText += text[i];
            i++;
            if(i>=text.length){
                clearInterval(interval);
                terminal.innerText += "\n";
                setTimeout(callback,800);
            }
        },40);
    }

    function nextLine(){
        if(lineIndex < lines.length){
            typeLine(lines[lineIndex], ()=>{
                lineIndex++;
                nextLine();
            });
        } else {
            startLoading();
        }
    }

    function startLoading(){
        let width=0;
        let stuck=false;

        let loading=setInterval(()=>{

            if(!stuck){
                width+=1;
                progress.style.width=width+"%";
            }

            if(width>=66 && !stuck){
                stuck=true;
                progress.style.width="66%";

                terminal.innerText+="\nENTITY REFUSING SHUTDOWN...\n";
                document.body.style.animation="shake 0.1s infinite";

                setTimeout(()=>{
                    document.body.style.animation="";
                    terminal.innerText+="OVERRIDE SUCCESSFUL.\n";
                    forceFinish();
                },4000);
            }

        },80);

        function forceFinish(){
            let jump=setInterval(()=>{
                width+=3;
                progress.style.width=width+"%";

                if(width>=100){
                    clearInterval(jump);
                    clearInterval(loading);

                    let flash=document.createElement("div");
                    flash.style.position="fixed";
                    flash.style.top=0;
                    flash.style.left=0;
                    flash.style.width="100%";
                    flash.style.height="100%";
                    flash.style.background="white";
                    flash.style.zIndex="9999";
                    document.body.appendChild(flash);

                    setTimeout(()=>{
                        window.location.href="https://www.meatspin.com/shock-sites/2-girls-1-cup/";
                    },600);
                }
            },60);
        }
    }

    nextLine();
}
</script>
</body>
</html>

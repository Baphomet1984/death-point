<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Signal Entity</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
    color:#0f0;
}

/* CRT */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.04) 0px,
        rgba(0,255,0,0.04) 1px,
        transparent 2px,
        transparent 3px
    );
    pointer-events:none;
}

/* Código flotante */
.code-fragment{
    position:absolute;
    opacity:0.2;
    user-select:none;
    pointer-events:none;
}

/* Punto rojo */
#signal{
    position:fixed;
    top:15px;
    left:15px;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 15px red;
    cursor:pointer;
}

/* Overlay mensajes */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:2rem;
    color:red;
    text-align:center;
    background:black;
}

/* Glitch fuerte */
.glitch{
    animation: glitch 0.12s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-6px,6px);}
    40%{transform:translate(6px,-6px);}
    60%{transform:translate(-4px,4px);}
    80%{transform:translate(4px,-4px);}
    100%{transform:translate(0);}
}
</style>
</head>

<body>

<div id="signal"></div>
<div id="overlay"></div>

<script>

// -------- CÓDIGO VIVO --------

const fragments = [
"kernel.panic()",
"ERR_FATAL_SIGNAL",
"memory_corruption",
"void main(){ }",
"0x004F3A",
"decrypt.fail",
"inject.override()",
"segmentation_fault"
];

for(let i=0;i<50;i++){
    let span = document.createElement("div");
    span.className="code-fragment";
    span.innerText = fragments[Math.floor(Math.random()*fragments.length)];
    span.style.top = Math.random()*100+"vh";
    span.style.left = Math.random()*100+"vw";
    span.style.fontSize = (12 + Math.random()*18)+"px";
    document.body.appendChild(span);

    setInterval(()=>{
        let text = span.innerText;
        let i = Math.floor(Math.random()*text.length);
        span.innerText =
            text.substring(0,i) +
            String.fromCharCode(33+Math.random()*94) +
            text.substring(i+1);
    },1000 + Math.random()*2000);
}

// -------- PUNTO VIVO --------

let signal = document.getElementById("signal");
let holdTimer;
let holdTime = 1500;

// Parpadeo irregular
setInterval(()=>{
    signal.style.opacity = Math.random() > 0.7 ? 0.3 : 1;
},300);

// Movimiento nervioso
setInterval(()=>{
    let x = Math.random()*8 -4;
    let y = Math.random()*8 -4;
    signal.style.transform = `translate(${x}px,${y}px)`;
},700);

signal.addEventListener("mousedown", startHold);
signal.addEventListener("touchstart", startHold);

signal.addEventListener("mouseup", cancelHold);
signal.addEventListener("mouseleave", cancelHold);
signal.addEventListener("touchend", cancelHold);

function startHold(){
    holdTimer = setTimeout(startSequence, holdTime);
}

function cancelHold(){
    clearTimeout(holdTimer);
}

// -------- SECUENCIA CINEMÁTICA --------

function startSequence(){

    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }

    document.querySelectorAll(".code-fragment").forEach(e=>e.remove());
    signal.remove();

    let overlay = document.getElementById("overlay");
    overlay.style.display="flex";

    let messages = [
        "Signal Detected...",
        "Unauthorized Access...",
        "Entity Awakening..."
    ];

    let index = 0;

    function nextMessage(){
        if(index < messages.length){
            overlay.innerHTML = "<div class='glitch'>"+messages[index]+"</div>";
            index++;
            setTimeout(nextMessage, 1800);
        } else {
            blackout();
        }
    }

    nextMessage();
}

// -------- APAGÓN + SYSTEM FAILURE --------

function blackout(){
    let overlay = document.getElementById("overlay");
    overlay.innerHTML="";
    overlay.style.background="black";

    setTimeout(()=>{
        overlay.innerHTML="<div class='glitch'>SYSTEM FAILURE</div><div style='font-size:1rem;color:white;margin-top:20px;'>Touch to continue...</div>";

        let audio = new Audio();
        audio.src="https://assets.mixkit.co/sfx/preview/mixkit-glitch-distortion-2898.mp3";
        audio.play();

    },800);
}

// -------- TOQUE FINAL --------

document.getElementById("overlay").addEventListener("click",()=>{
    window.location.href="https://tupaginagrotesca.com";
});

</script>

</body>
</html>

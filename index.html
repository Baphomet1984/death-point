<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>System Hub</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: monospace;
        color: #0f0;
        cursor: none;
    }

    #logs {
        position: absolute;
        top: 20%;
        width: 100%;
        text-align: center;
        font-size: 18px;
        opacity: 0;
    }

    .glitch {
        animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
        0% { filter: hue-rotate(0deg) contrast(2); }
        50% { filter: hue-rotate(180deg) contrast(5); }
        100% { filter: hue-rotate(0deg) contrast(2); }
    }

    #redPoint {
        position: absolute;
        width: 12px;
        height: 12px;
        background: red;
        border-radius: 50%;
        opacity: 0;
        pointer-events: auto;
        transition: transform 0.1s linear;
    }

    #accessText {
        position: absolute;
        bottom: 20%;
        width: 100%;
        text-align: center;
        color: red;
        font-size: 16px;
        opacity: 0;
    }
</style>
</head>
<body>

<div id="logs"></div>
<div id="redPoint"></div>
<div id="accessText">ACCESS GRANTED</div>

<script>

let systemState = "normal";
const logsDiv = document.getElementById("logs");
const redPoint = document.getElementById("redPoint");
const accessText = document.getElementById("accessText");

let lastInteraction = Date.now();
let holdInterval;
let holdTime = 0;
let flickerActive = false;
let redX = window.innerWidth / 2;
let redY = window.innerHeight / 2;

function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function setState(state) {
    systemState = state;
    console.log("STATE:", state);
}

async function startSequence() {

    // 1️⃣ Glitch
    setState("glitch");
    document.body.classList.add("glitch");
    await wait(3000);
    document.body.classList.remove("glitch");

    // 2️⃣ Logs
    setState("logs");
    logsDiv.style.opacity = 1;
    logsDiv.innerHTML = `
        [CRITICAL] System integrity compromised<br>
        [WARN] Avatar instance unstable<br>
        [FAIL] Kernel response timeout
    `;
    await wait(3000);
    logsDiv.style.opacity = 0;

    // 3️⃣ Silencio
    setState("silence");
    await wait(5000);

    // 4️⃣ Punto rojo
    spawnRedPoint();
}

function spawnRedPoint() {
    setState("redIdle");

    redPoint.style.opacity = 0.1;
    redPoint.style.left = redX + "px";
    redPoint.style.top = redY + "px";

    flickerActive = true;
    flicker();
    idleMovement();
}

function flicker() {
    if (!flickerActive) return;

    redPoint.style.opacity = Math.random() * 0.6 + 0.2;

    setTimeout(flicker, Math.random() * 1500 + 200);
}

function idleMovement() {
    if (systemState === "redIdle") {
        if (Date.now() - lastInteraction > 3000) {
            redX += (Math.random() - 0.5) * 4;
            redY += (Math.random() - 0.5) * 4;

            redPoint.style.left = redX + "px";
            redPoint.style.top = redY + "px";
        }
    }

    requestAnimationFrame(idleMovement);
}

document.addEventListener("mousemove", () => {
    lastInteraction = Date.now();
});

redPoint.addEventListener("mousedown", () => {

    if (systemState !== "redIdle") return;

    holdTime = 0;

    holdInterval = setInterval(() => {
        holdTime += 100;

        redPoint.style.transform = `scale(${1 + holdTime / 3000})`;

        if (holdTime >= 3000) {
            clearInterval(holdInterval);
            awakenRedPoint();
        }

    }, 100);
});

document.addEventListener("mouseup", () => {
    clearInterval(holdInterval);
    redPoint.style.transform = "scale(1)";
});

function awakenRedPoint() {
    setState("readyToOpen");

    flickerActive = false;
    redPoint.style.opacity = 1;
    redPoint.style.transform = "scale(1.5)";
    accessText.style.opacity = 1;
}

document.addEventListener("click", () => {
    if (systemState === "readyToOpen") {
        document.body.style.background = "black";
        setTimeout(() => {
            window.location.href = "https://tupagina.com";
        }, 500);
    }
});

// Inicia automáticamente
startSequence();

</script>
</body>
</html>

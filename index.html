<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Signal Entity</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: monospace;
    color:#0f0;
}

/* CRT */
body::after{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.04) 0px,
        rgba(0,255,0,0.04) 1px,
        transparent 2px,
        transparent 3px
    );
    pointer-events:none;
}

/* Código flotante */
.code-fragment{
    position:absolute;
    opacity:0.2;
    user-select:none;
    pointer-events:none;
}

/* Punto rojo */
#signal{
    position:fixed;
    top:15px;
    left:15px;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 15px red;
    cursor:pointer;
}

/* Overlay general */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:black;
}

/* Glitch */
.glitch{
    color:red;
    font-size:2rem;
    animation: glitch 0.12s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-6px,6px);}
    40%{transform:translate(6px,-6px);}
    60%{transform:translate(-4px,4px);}
    80%{transform:translate(4px,-4px);}
    100%{transform:translate(0);}
}

/* Terminal */
#terminal{
    color:#00ff00;
    font-size:14px;
    width:80%;
    max-width:800px;
    text-align:left;
    white-space:pre-line;
}

#progressBar{
    width:100%;
    height:10px;
    border:1px solid #00ff00;
    margin-top:10px;
}

#progress{
    height:100%;
    width:0%;
    background:#00ff00;
}
</style>
</head>

<body>

<div id="signal"></div>
<div id="overlay"></div>

<script>

// ---------- CÓDIGO FLOTANTE ----------

const fragments = [
"kernel.panic()",
"ERR_FATAL_SIGNAL",
"memory_corruption",
"void main(){ }",
"0x004F3A",
"decrypt.fail",
"inject.override()",
"segmentation_fault"
];

for(let i=0;i<50;i++){
    let span = document.createElement("div");
    span.className="code-fragment";
    span.innerText = fragments[Math.floor(Math.random()*fragments.length)];
    span.style.top = Math.random()*100+"vh";
    span.style.left = Math.random()*100+"vw";
    span.style.fontSize = (12 + Math.random()*18)+"px";
    document.body.appendChild(span);
}

// ---------- PUNTO VIVO ----------

let signal = document.getElementById("signal");
let holdTimer;

signal.addEventListener("mousedown", startHold);
signal.addEventListener("touchstart", startHold);
signal.addEventListener("mouseup", cancelHold);
signal.addEventListener("mouseleave", cancelHold);
signal.addEventListener("touchend", cancelHold);

function startHold(){
    holdTimer = setTimeout(startSequence, 1500);
}

function cancelHold(){
    clearTimeout(holdTimer);
}

// ---------- SECUENCIA INICIAL ----------

function startSequence(){

    document.querySelectorAll(".code-fragment").forEach(e=>e.remove());
    signal.remove();

    let overlay = document.getElementById("overlay");
    overlay.style.display="flex";

    let messages = [
        "Signal Detected...",
        "Unauthorized Access...",
        "Entity Awakening..."
    ];

    let index = 0;

    function nextMessage(){
        if(index < messages.length){
            overlay.innerHTML = "<div class='glitch'>"+messages[index]+"</div>";
            index++;
            setTimeout(nextMessage, 1800);
        } else {
            showFailure();
        }
    }

    nextMessage();
}

// ---------- SYSTEM FAILURE ----------

function showFailure(){
    let overlay = document.getElementById("overlay");
    overlay.innerHTML = "<div class='glitch'>SYSTEM FAILURE</div><div style='color:white;margin-top:20px;'>Touch to continue...</div>";
}

// ---------- TERMINAL FINAL ----------

document.getElementById("overlay").addEventListener("click",()=>{
    startTerminal();
});

function startTerminal(){

    let overlay = document.getElementById("overlay");
    overlay.innerHTML = `
        <div id="terminal"></div>
        <div id="progressBar"><div id="progress"></div></div>
    `;

    let terminal = document.getElementById("terminal");

    let commands = [
        "Initializing override protocol...",
        "Bypassing security layers...",
        "Decrypting hidden entity...",
        "Injecting unknown payload...",
        "System integrity compromised...",
        "WARNING: DANGEROUS UNLOCK SEQUENCE COMPLETE"
    ];

    let i = 0;

    function typeLine(){
        if(i < commands.length){
            let line = commands[i];
            let charIndex = 0;
            let lineElement = document.createElement("div");
            terminal.appendChild(lineElement);

            let typing = setInterval(()=>{
                lineElement.textContent += line.charAt(charIndex);
                charIndex++;
                if(charIndex >= line.length){
                    clearInterval(typing);
                    i++;
                    setTimeout(typeLine,500);
                }
            },30);
        } else {
            startLoading();
        }
    }

    typeLine();
}

function startLoading(){
    let progress = document.getElementById("progress");
    let width = 0;

    let loading = setInterval(()=>{
        width += 2;
        progress.style.width = width + "%";

        if(width >= 100){
            clearInterval(loading);
            setTimeout(()=>{
                window.location.href="https://tupaginagrotesca.com";
            },1200);
        }
    },60);
}

</script>
</body>
</html>
